<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1040" viewBox="0 0 1200 1040" role="img" aria-label="Tailscale and Mullvad architecture, common failure points, and troubleshooting checklist">
  <rect x="0" y="0" width="1200" height="1040" fill="#ffffff"/>

  <text x="600" y="42" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#111827" text-anchor="middle">Tailscale + Mullvad: Flow and Incident Quick Guide</text>
  <text x="600" y="72" font-family="Arial, sans-serif" font-size="16" fill="#4b5563" text-anchor="middle">GitHub-safe SVG: normal flow, six failure points, and first-response checklist</text>

  <text x="60" y="115" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Normal Traffic Flow</text>

  <rect x="60" y="140" width="240" height="95" rx="8" ry="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180" y="175" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Device</text>
  <text x="180" y="200" font-family="Arial, sans-serif" font-size="14" fill="#1f2937" text-anchor="middle">Laptop / Server / Workstation</text>

  <rect x="345" y="140" width="250" height="95" rx="8" ry="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="470" y="175" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Tailscale Tailnet</text>
  <text x="470" y="200" font-family="Arial, sans-serif" font-size="14" fill="#1f2937" text-anchor="middle">Encrypted WireGuard mesh</text>

  <rect x="640" y="140" width="250" height="95" rx="8" ry="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="765" y="175" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Mullvad Exit Node</text>
  <text x="765" y="200" font-family="Arial, sans-serif" font-size="14" fill="#1f2937" text-anchor="middle">Selected egress location</text>

  <rect x="935" y="140" width="205" height="95" rx="8" ry="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="1037" y="175" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Public Internet</text>
  <text x="1037" y="200" font-family="Arial, sans-serif" font-size="14" fill="#1f2937" text-anchor="middle">Traffic exits from Mullvad IP</text>

  <line x1="300" y1="188" x2="345" y2="188" stroke="#059669" stroke-width="4"/>
  <polygon points="345,188 331,180 331,196" fill="#059669"/>
  <line x1="595" y1="188" x2="640" y2="188" stroke="#059669" stroke-width="4"/>
  <polygon points="640,188 626,180 626,196" fill="#059669"/>
  <line x1="890" y1="188" x2="935" y2="188" stroke="#059669" stroke-width="4"/>
  <polygon points="935,188 921,180 921,196" fill="#059669"/>

  <text x="322" y="172" font-family="Arial, sans-serif" font-size="12" fill="#065f46" text-anchor="middle">Tunnel</text>
  <text x="617" y="172" font-family="Arial, sans-serif" font-size="12" fill="#065f46" text-anchor="middle">Exit routing</text>
  <text x="912" y="172" font-family="Arial, sans-serif" font-size="12" fill="#065f46" text-anchor="middle">Egress</text>

  <line x1="60" y1="280" x2="1140" y2="280" stroke="#d1d5db" stroke-width="2"/>
  <text x="60" y="318" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Common Failure Points (6)</text>

  <rect x="60" y="340" width="340" height="95" rx="8" ry="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="80" y="370" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">1) DNS resolution fails</text>
  <text x="80" y="395" font-family="Arial, sans-serif" font-size="13" fill="#374151">Symptom: Can reach IPs, but hostnames fail.</text>
  <text x="80" y="415" font-family="Arial, sans-serif" font-size="13" fill="#374151">Check DNS settings and MagicDNS behavior.</text>

  <rect x="430" y="340" width="340" height="95" rx="8" ry="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="450" y="370" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">2) No internet through exit node</text>
  <text x="450" y="395" font-family="Arial, sans-serif" font-size="13" fill="#374151">Symptom: Public sites unreachable after switch.</text>
  <text x="450" y="415" font-family="Arial, sans-serif" font-size="13" fill="#374151">Validate route table and exit-node health.</text>

  <rect x="800" y="340" width="340" height="95" rx="8" ry="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="820" y="370" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">3) Exit node not actually active</text>
  <text x="820" y="395" font-family="Arial, sans-serif" font-size="13" fill="#374151">Symptom: Public IP is still local ISP address.</text>
  <text x="820" y="415" font-family="Arial, sans-serif" font-size="13" fill="#374151">Reapply: tailscale set --exit-node=...</text>

  <rect x="60" y="460" width="340" height="95" rx="8" ry="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="80" y="490" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">4) Tailnet peers unreachable</text>
  <text x="80" y="515" font-family="Arial, sans-serif" font-size="13" fill="#374151">Symptom: Cannot reach 100.x.x.x devices.</text>
  <text x="80" y="535" font-family="Arial, sans-serif" font-size="13" fill="#374151">Inspect firewall and ACL policy changes.</text>

  <rect x="430" y="460" width="340" height="95" rx="8" ry="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="450" y="490" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">5) Latency or packet loss spike</text>
  <text x="450" y="515" font-family="Arial, sans-serif" font-size="13" fill="#374151">Symptom: Slow apps after enabling exit node.</text>
  <text x="450" y="535" font-family="Arial, sans-serif" font-size="13" fill="#374151">Try a different Mullvad city/region node.</text>

  <rect x="800" y="460" width="340" height="95" rx="8" ry="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="820" y="490" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">6) Local LAN access lost</text>
  <text x="820" y="515" font-family="Arial, sans-serif" font-size="13" fill="#374151">Symptom: Cannot reach 192.168.x.x resources.</text>
  <text x="820" y="535" font-family="Arial, sans-serif" font-size="13" fill="#374151">Use --exit-node-allow-lan-access if needed.</text>

  <line x1="60" y1="600" x2="1140" y2="600" stroke="#d1d5db" stroke-width="2"/>
  <text x="60" y="638" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Basic Troubleshooting Checklist</text>

  <rect x="60" y="660" width="1080" height="320" rx="10" ry="10" fill="#f8fafc" stroke="#334155" stroke-width="2"/>

  <text x="90" y="700" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">1. Confirm Tailscale state</text>
  <text x="110" y="724" font-family="Arial, sans-serif" font-size="14" fill="#334155">Run: tailscale status</text>
  <text x="110" y="746" font-family="Arial, sans-serif" font-size="14" fill="#334155">Expected: logged in, peers visible, no auth errors</text>

  <text x="90" y="780" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">2. Verify exit node selection and route</text>
  <text x="110" y="804" font-family="Arial, sans-serif" font-size="14" fill="#334155">Run: tailscale exit-node list</text>
  <text x="110" y="826" font-family="Arial, sans-serif" font-size="14" fill="#334155">Then reapply exit node if uncertain</text>

  <text x="90" y="860" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">3. Check internet and DNS separately</text>
  <text x="110" y="884" font-family="Arial, sans-serif" font-size="14" fill="#334155">Run: ping 1.1.1.1 and ping example.com</text>
  <text x="110" y="906" font-family="Arial, sans-serif" font-size="14" fill="#334155">If IP works and DNS fails, focus DNS path first</text>

  <text x="620" y="700" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">4. Validate egress IP</text>
  <text x="640" y="724" font-family="Arial, sans-serif" font-size="14" fill="#334155">Run: curl -4 ifconfig.me</text>
  <text x="640" y="746" font-family="Arial, sans-serif" font-size="14" fill="#334155">Expected: Mullvad exit node public address</text>

  <text x="620" y="780" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">5. Inspect routing table</text>
  <text x="640" y="804" font-family="Arial, sans-serif" font-size="14" fill="#334155">Linux: ip route</text>
  <text x="640" y="826" font-family="Arial, sans-serif" font-size="14" fill="#334155">macOS: netstat -rn | Windows: route print</text>

  <text x="620" y="860" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">6. Reset path if still broken</text>
  <text x="640" y="884" font-family="Arial, sans-serif" font-size="14" fill="#334155">Clear exit node, wait 10 seconds, set it again</text>
  <text x="640" y="906" font-family="Arial, sans-serif" font-size="14" fill="#334155">Re-test peers, DNS, and public egress IP</text>

  <text x="600" y="1018" font-family="Arial, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Reference: runbooks/08-incident-playbooks.md</text>
</svg>
